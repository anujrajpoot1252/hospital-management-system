<!DOCTYPE html>
<html>
<head>
<title>Patient Registration</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
<h2>HOSPITAL MANAGEMENT SYSTEM</h2>
<a href="index.html">HOME</a>
</div>

<div class="main">

<div class="left">
<h2>Patient Portal</h2>
</div>

<div class="right">

<h2>Patient Registration</h2>

<form action="patient.php" method="POST" class="form" enctype="multipart/form-data" onsubmit="return checkPassword()">

<input type="text" name="name" placeholder="Name" required><br>
<input type="email" name="email" placeholder="Email" required><br>
<input type="number" name="age" placeholder="Age" required><br>
<input type="text" name="phone" placeholder="Phone" required><br>
<input type="text" name="weight" placeholder="Weight" required><br>
<input type="text" name="height" placeholder="height" required><br>
    
<select name="bgroup" required>
    <option value="">Select Blood_group</option>
    <option value="A+">A+</option>
    <option value="A-">A-</option>
    <option value="B+">B+</option>
    <option value="B-">B-</option>
    <option value="AB+">AB+</option>
    <option value="AB-">AB-</option>
    <option value="O+">O+</option>
    <option value="O-">O-</option>
</select><br>

<input type="text" name="disease" placeholder="Disease" required><br>
<input type="text" name="history" placeholder="History" required><br>
    
<input type="password" name="password" placeholder="create password"
    pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}"
    title="Password must contain uppercase, lowercase, number, special character and 8+ characters"
    required>
    <br>
<input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required><br>

<div class="gender">
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female
</div>
</div>
<input type="file" name="photo" placeholder="photo" required><br>
    


<button type="submit" class="registerbtn">Register</button>
 <br><br>
<p style="color: rgb(23, 23, 24); font-weight: bold; ">Already have an account?</p>    
<a href="patient login.html"  style="color: rgb(32, 94, 228);  text-decoration: underline; font-weight: bold; "> Login here</a>


</form>

</div>
</div>

<script>
// Yeh function password check karta hai
function checkPassword() {
    var pass = document.getElementById("password").value;
    var confirm = document.getElementById("confirm_password").value;
    
    if (pass !== confirm) {
        alert("Passwords match nahi kar rahe hain!");
        return false;   // Form submit nahi hoga
    }
    return true;
}
</script>

</body>
</html>
