<!DOCTYPE html>
<html>
<head>
<title>Patient Registration</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">
<h2>HOSPITAL MANAGEMENT SYSTEM</h2>
<a href="index.html">HOME</a>
</div>

<div class="main">

<div class="left">
<h2>Patient Portal</h2>
</div>

<div class="right">

<h3>Patient Registration</h3>

<form action="patient.php" method="POST" class="form">

<input type="text" name="name" placeholder="Name" required><br>
<input type="email" name="email" placeholder="Email" required><br>

<input type="number" name="age" placeholder="Age" required><br>
<input type="text" name="phone" placeholder="Phone" required><br>
<input type="text" name="weight" placeholder="Weight" required><br>

<!-- Blood Group Dropdown -->
<select name="bgroup" required>
    <option value="">Select Blood Group</option>
    <option value="A+">A+</option>
    <option value="A-">A-</option>
    <option value="B+">B+</option>
    <option value="B-">B-</option>
    <option value="AB+">AB+</option>
    <option value="AB-">AB-</option>
    <option value="O+">O+</option>
    <option value="O-">O-</option>
</select><br>

<input type="text" name="disease" placeholder="Disease" required><br>
<input type="text" name="history" placeholder="History" required><br>
    <input type="password" name="New password" placeholder="New Password" required><br>
<input type="password" name="Confirm password" placeholder="Confirm Password" required><br>


<div class="gender">
<input type="radio" name="gender" value="Male" required> Male
<input type="radio" name="gender" value="Female" required> Female
</div>

<button type="submit" class="registerbtn">Register</button>

</form>

</div>
</div>

</body>
</html>
