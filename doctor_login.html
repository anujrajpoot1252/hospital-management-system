<!DOCTYPE html>
<html lang="en">
<head>
    <title>Doctor Login – Hospital Management System</title>
     <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy: #0f1f3d;
            --teal: #0e9e8e;
            --teal-dark: #0b8070;
            --light: #f0f4f8;
            --white: #ffffff;
            --gray: #6b7280;
            --border: #d1d9e0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgb(59, 141, 248);
            color: var(--white);
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        header a {
            color: red;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        header a:hover { color: #5eead4; }

        .main {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-box {
            background: var(--white);
            border-radius: 16px;
            padding: 44px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 40px rgba(15,31,61,0.12);
        }

        .form-box h2 {
            font-family: 'Playfair Display', serif;
            color: var(--navy);
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .form-box p {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--navy);
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        input[type="email"],
        input[type="time"],
        select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--navy);
            background: #f8fafc;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            appearance: none;
        }

        input:focus, select:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(14,158,142,0.15);
            background: var(--white);
        }

        .time-group {
            display: flex;
            gap: 12px;
        }

        .time-group .field {
            flex: 1;
            margin-bottom: 0;
        }

        .time-row {
            margin-bottom: 16px;
        }

        .time-row label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--navy);
            margin-bottom: 6px;
        }

        button {
            width: 100%;
            padding: 13px;
            background: var(--teal);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover { background: var(--teal-dark); }
        button:active { transform: scale(0.98); }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 22px 0;
        }

        .section-title {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--teal);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.875rem;
            color: var(--gray);
        }

        .footer-link a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <h2>HOSPITAL MANAGEMENT SYSTEM</h2>
    <a href="index.html"> HOME</a>
</header>

<div class="main">
    <div class="form-box">
        <h2>Doctor Login</h2>
        <p>Welcome back! Please enter your credentials.</p>

        <form method="post" action="doctor_login.php">
            <div class="field">
                <label for="username">Username / Doctor ID</label>
                <input type="text" id="username" name="username" placeholder="Enter your ID" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" name="login">Login</button>
        </form>

        <div class="footer-link">
            New doctor? <a href="doctor_registration.html">Register here</a>
        </div>
    </div>
</div>

</body>
</html>
