<!DOCTYPE html>
<html>
<head>
    <title>Appointment Page</title>
    <style>
         body {
            font-family: Arial;
            background-color: #f0f8ff;
        }

        .container {
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
            color: #2c7be5;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2c7be5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1a5fd0;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Book Appointment</h2>

    <!-- Patient Details -->
    <input type="text" placeholder="Patient Name" required>

    <input type="number" placeholder="Age">

    <select>
        <option>Select Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>

    <!-- Doctor Selection -->
    <select>
        <option>Select Doctor</option>
        <option>Dr. Sharma (Cardiologist)</option>
        <option>Dr. Verma (Dentist)</option>
    </select>

    <!-- Date & Time -->
    <input type="date">

    <select>
        <option>Select Time</option>
        <option>10:00 AM</option>
        <option>10:30 AM</option>
        <option>11:00 AM</option>
        <option>5:00 PM</option>
        <option>5:30 PM</option>
    </select>

    <!-- Problem -->
    <textarea placeholder="Describe your problem"></textarea>

    <!-- Contact -->
    <input type="text" placeholder="Mobile Number">

    <!-- Submit -->
    <button>Book Appointment</button>

</div>

</body>
</html>
