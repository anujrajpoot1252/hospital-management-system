<!DOCTYPE html>
<html>
<head>
<title>Patient Registration</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#111;
    color:white;
}

header{
    background:#000;
    padding:15px;
    text-align:center;
}
header h2{
    color:#711bd3;
}
header a{
    color:#33cc33;
    text-decoration:none;
    margin-left:20px;
}

.main{
    display:flex;
    height:90vh;
}

.left{
    width:40%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    color:#33cc33;
}

.right{
    width:60%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.form{
    background:#222;
    padding:30px;
    border-radius:10px;
}

.form input, .form select{
    padding:10px;
    width:250px;
    margin:8px;
    border:none;
    border-radius:5px;
}

.gender{
    margin:10px;
}

.registerbtn{
    background:#33cc33;
    padding:12px;
    border:none;
    width:270px;
    font-size:18px;
    cursor:pointer;
    border-radius:5px;
}
.registerbtn:hover{
    background:lime;
}
</style>

</head>

<body>

<header>
<h2>HOSPITAL MANAGEMENT SYSTEM</h2>
<a href="index.html">HOME</a>
</header>

<div class="main">

<div class="left">
<h2>Patient Portal</h2>
</div>

<div class="right">

<h2>Patient Registration</h2>

<form action="connect.php" method="POST" class="form">

<input type="text" name="name" placeholder="Name" required><br>
<input type="email" name="email" placeholder="Email" required><br>

<input type="number" name="age" placeholder="Age" required><br>
<input type="text" name="phone" placeholder="Phone" required><br>
<input type="text" name="weight" placeholder="Weight" required><br>

<!-- Blood Group Dropdown -->
<select name="bgroup" required>
    <option value="">Select Blood Group</option>
    <option value="A+">A+</option>
    <option value="A-">A-</option>
    <option value="B+">B+</option>
    <option value="B-">B-</option>
    <option value="AB+">AB+</option>
    <option value="AB-">AB-</option>
    <option value="O+">O+</option>
    <option value="O-">O-</option>
</select><br>

<input type="text" name="disease" placeholder="Disease" required><br>
<input type="text" name="history" placeholder="History" required><br>

<div class="gender">
<input type="radio" name="gender" value="Male" required> Male
<input type="radio" name="gender" value="Female" required> Female
</div>

<button type="submit" class="registerbtn">Register</button>

</form>

</div>
</div>

</body>
</html>
