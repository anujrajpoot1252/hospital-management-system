<!DOCTYPE html>
<html>
<head>
<title>Patient Login</title>
<style>
    .header{
    font-size:15px;
    margin-top:20px;
    color:white;
    background-color: #007bff;
}

a{
    color:#cc3333;
    text-decoration:none;
    font-weight: bold;
    text-align: center;
}

.login-box{
    width:320px;
    margin:80px auto;
    background:rgb(15, 240, 240);
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px #000;
    text-align: center;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    border:none;
    border-radius:5px;
}

button{
    background:black;
    border:none;
    padding:10px 20px;
    color:white;
    font-size:18px;
    border-radius:5px;
    cursor:pointer;
}
h3{
    color:white;
    text-align: center;
}

button:hover{
    background:rgb(76, 83, 83);
}

#showCaptcha{
    letter-spacing:5px;
    color:white;
    text-align: center;
}
    
</style>
<script>
// 4 digit captcha generate
function generateCaptcha(){
    var captcha = Math.floor(1000 + Math.random()*9000);
    document.getElementById("showCaptcha").innerHTML = captcha;
    document.getElementById("realCaptcha").value = captcha;
}

// check captcha
function checkCaptcha(){
    var real = document.getElementById("realCaptcha").value;
    var user = document.getElementById("userCaptcha").value;

    if(real != user){
        alert("Wrong Captcha ❌");
        return false;
    }
    return true;
}
</script>

</head>

<body onload="generateCaptcha()">
<div class="header">
<h1>Hospital Management System</h1>
<br>
<a href="index.html">HOME</a>
</div>

<div class="login-box">
    <h2>Patient Login</h2>

    <form action="patient login.php" method="post" onsubmit="return checkCaptcha()">
   

    <input type="email" name="email" placeholder="Enter Email" required><br><br>

    <input type="password" name="password" placeholder="Enter Password" required><br><br>

    <h3>Enter captcha</h3>
    <h1 id="showCaptcha"></h1>

    <input type="text" name="userCaptcha" id="userCaptcha" placeholder="Enter captcha" required>
    
    <input type="hidden" name="realCaptcha" id="realCaptcha">

    <br><br>
    <button type="submit">Login</button>

</form>

<a href="forget password.html ">Forget Password?</a>

</div>

</body>>
</html>
