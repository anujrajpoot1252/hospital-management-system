<!DOCTYPE html>
<html>
<head>
<title>Patient Login</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}

header{
    font-size:28px;
    margin-top:20px;
    color:#711bd3;
}

a{
    color:#33cc33;
    text-decoration:none;
}

.login-box{
    width:320px;
    margin:80px auto;
    background:#222;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px #000;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    border:none;
    border-radius:5px;
}

button{
    background:#33cc33;
    border:none;
    padding:10px 20px;
    color:white;
    font-size:18px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#28a428;
}

#showCaptcha{
    letter-spacing:5px;
    color:#33cc33;
}
</style>

<script>
// 4 digit captcha generate
function generateCaptcha(){
    var captcha = Math.floor(1000 + Math.random()*9000);
    document.getElementById("showCaptcha").innerHTML = captcha;
    document.getElementById("realCaptcha").value = captcha;
}

// check captcha
function checkCaptcha(){
    var real = document.getElementById("realCaptcha").value;
    var user = document.getElementById("userCaptcha").value;

    if(real != user){
        alert("Wrong Captcha ❌");
        return false;
    }
    return true;
}
</script>

</head>

<body onload="generateCaptcha()">

<header>Hospital Management System</header>
<br>
<a href="index.html">HOME</a>

<div class="login-box">
    <h2>Patient Login</h2>

    <form action="patient login.php" method="post" onsubmit="return checkCaptcha()">

        <input type="email" name="email" placeholder="Enter Email" required><br>

        <h3>Enter captcha </h3>
        <h1 id="showCaptcha"></h1>

        <input type="text" id="userCaptcha" placeholder="Enter Number" required>
        <input type="hidden" id="realCaptcha">

        <br>
        <button type="submit">Login</button>

    </form>
</div>

</body>
</html>
