<!DOCTYPE html>
<html>
<head>
<title>Patient Login</title>
<style>
    body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#e0e0e0;
}

/* HEADER */
.header{
    background:#1976d2;
    color:white;
    text-align:center;
    padding:15px 0;
}

.header h1{
    margin:0;
}

.header a{
    color:red;
    font-weight:bold;
    text-decoration:none;
}

/* LOGIN BOX */
.login-box{
    width:350px;
    margin:80px auto;
    background:#20c9c9;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
    text-align:center;
}

/* INPUTS */
input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:6px;
    background:#f1f1f1;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#2f6edb;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1e4fa8;
}

/* TEXT */
h2{
    color:#1e3a8a;
}

h3{
    color:white;
}

#showCaptcha{
    font-size:28px;
    letter-spacing:5px;
    color:white;
    margin:10px 0;
}

/* FORGET PASSWORD */
.login-box a{
    display:block;
    margin-top:10px;
    color:red;
}
</style>
<script>
// 4 digit captcha generate
function generateCaptcha(){
    var captcha = Math.floor(1000 + Math.random()*9000);
    document.getElementById("showCaptcha").innerHTML = captcha;
    document.getElementById("realCaptcha").value = captcha;
}

// check captcha
function checkCaptcha(){
    var real = document.getElementById("realCaptcha").value;
    var user = document.getElementById("userCaptcha").value;

    if(real != user){
        alert("Wrong Captcha ❌");
        return false;
    }
    return true;
}
</script>

</head>

<body onload="generateCaptcha()">
<div class="header">
<h1>Hospital Management System</h1>
<br>
<a href="index.html">HOME</a>
</div>

<div class="login-box">
    <h2>Patient Login</h2>

    <form action="patient login.php" method="post" onsubmit="return checkCaptcha()">
   

    <input type="email" name="email" placeholder="Enter Email" required><br><br>

    <input type="password" name="password" placeholder="Enter Password" required><br><br>

    <h3>Enter captcha</h3>
    <h1 id="showCaptcha"></h1>

    <input type="text" name="userCaptcha" id="userCaptcha" placeholder="Enter captcha" required>
    
    <input type="hidden" name="realCaptcha" id="realCaptcha">

    <br><br>
    <button type="submit">Login</button>

</form>

<a href="forget password.html ">Forget Password?</a>

</div>

</body>>
</html>
