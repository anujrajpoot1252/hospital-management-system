<!DOCTYPE html>
<html>
<head>
<title>Admin login</title>
<style>
 body{

.header{
    background:#1976d2;
    color:white;

    padding:15px 0;
}

.header h1{
    margin:0;
}

.header a{
    color:red;

    font-weight:bold;
}

.login-box{
    width:320px;
    margin:80px auto;
    background:#20c9c9;
    padding:30px;
    border-radius:10px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    border:none;
    border-radius:5px;
    background:#f1f1f1;
}

button{
    width:95%;
    padding:10px;
    background:#2f6edb;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1e4fa8;
}

.login-box h2{
    color:#1e3a8a;
}

.login-box a{

    <form action="admin_login.php" method="post" onsubmit="return checkCaptcha()">
